steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tenderiq-server', './server']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tenderiq-server']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tenderiq-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tenderiq-server'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      
images:
  - 'gcr.io/$PROJECT_ID/tenderiq-server'
